server:
  port: 8080

spring:
  application:
    name: unified-auth-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:authdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-key-change-this-secret-key}
    access-minutes: ${JWT_ACCESS_MINUTES:15}
    refresh-days: ${JWT_REFRESH_DAYS:7}
    issuer: unified-auth-service
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  rate-limit:
    login-max-attempts: 5
    login-window-seconds: 60
    token-max-attempts: 20
    token-window-seconds: 60
